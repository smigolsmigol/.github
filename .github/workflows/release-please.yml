# Reusable release-please workflow.
#
# On every push to main, googleapis/release-please-action scans conventional
# commits since the last release and opens (or updates) a release PR with the
# version bump + auto-generated CHANGELOG. When that PR is merged, the action
# creates a tag, which fires the consumer's existing release.yml.
#
# Federico merges by hand; no auto-merge.
#
# Caller pattern:
#
#   # .github/workflows/release-please.yml in any consumer repo:
#   name: release-please
#   on:
#     push:
#       branches: [main]
#   permissions:
#     contents: write
#     pull-requests: write
#   jobs:
#     call:
#       uses: smigolsmigol/.github/.github/workflows/release-please.yml@main
#       permissions:
#         contents: write
#         pull-requests: write
#       with:
#         release-type: python      # or "node", "simple", "rust"
#         package-name: my-package  # name in pyproject/package.json
#
# For Rust+PyO3 repos (where the version lives in BOTH pyproject.toml and
# Cargo.toml), commit a release-please-config.json + .release-please-manifest.json
# at repo root and pass `config-file` + `manifest-file` inputs.

name: release-please (reusable)

on:
  workflow_call:
    inputs:
      release-type:
        type: string
        required: false
        default: "simple"
        description: 'release-please release-type (python | node | simple | rust). Ignored if config-file is set.'
      package-name:
        type: string
        required: false
        description: 'Package name (pyproject.toml [project].name or package.json name). Ignored if config-file is set.'
      config-file:
        type: string
        required: false
        default: ""
        description: 'Path to release-please-config.json (manifest mode). Use for monorepos or Rust+PyO3.'
      manifest-file:
        type: string
        required: false
        default: ""
        description: 'Path to .release-please-manifest.json. Required if config-file is set.'

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7  # v5.0.0
        with:
          release-type: ${{ inputs.release-type }}
          package-name: ${{ inputs.package-name }}
          config-file: ${{ inputs.config-file }}
          manifest-file: ${{ inputs.manifest-file }}
