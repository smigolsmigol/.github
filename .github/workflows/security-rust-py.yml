name: security (rust + pyo3)

# Reusable workflow for Rust+PyO3 repos (f3dx, f3dx-cache, f3dx-router).
# Consumer repos call this via:
#   jobs:
#     call:
#       uses: smigolsmigol/.github/.github/workflows/security-rust-py.yml@main
#
# Updates here propagate to all consumers at next CI run. SHA pin updates,
# new tools, new gates: ONE commit, applies everywhere.

on:
  workflow_call: {}

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  semgrep:
    name: semgrep (security-audit + secrets)
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep:1.156.0
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - run: semgrep scan --config p/security-audit --config p/secrets --error --metrics=off

  cargo-audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install cargo-audit --locked
      - run: cargo audit

  pip-audit:
    name: pip audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - run: pip install pip-audit
      - run: pip-audit --strict
        continue-on-error: true
