name: security (typescript)

# Reusable workflow for TypeScript / Node repos (keyguard, llmkit, f3dx-bench/worker).
# Consumer repos call this via:
#   jobs:
#     call:
#       uses: smigolsmigol/.github/.github/workflows/security-typescript.yml@main
#       with:
#         working_directory: worker     # cd before running npm/biome (default: ".")

on:
  workflow_call:
    inputs:
      working_directory:
        description: "Subdirectory for npm + biome (default: repo root)"
        required: false
        type: string
        default: "."
      node_version:
        description: "Node version (default: 20)"
        required: false
        type: string
        default: "20"

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  semgrep:
    name: semgrep (security-audit + secrets)
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep:1.156.0
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - run: semgrep scan --config p/security-audit --config p/secrets --error --metrics=off

  npm-audit:
    name: npm audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ inputs.node_version }}
      - run: npm ci
      - run: npm audit --audit-level=high
        continue-on-error: true
